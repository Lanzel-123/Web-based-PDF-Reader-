<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDFSense</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #2c3e50; color: #ecf0f1; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #34495e; color: #fff; padding: 20px; text-align: center; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    header h1 { margin: 0; font-size: 2em; }
    main { margin-top: 100px; margin-bottom: 100px; }
    main { display: flex; flex-direction: row; justify-content: space-between; gap: 40px; padding: 40px; align-items: flex-start; max-width: 1400px; margin: 0 auto; margin-top: 120px; margin-bottom: 120px; min-height: calc(100vh - 240px); overflow-y: auto; }
    .left, .right { flex: 1; min-width: 380px; display: flex; flex-direction: column; }
    .right { align-items: center; margin-left: 20px; }
    .card { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); width: 100%; max-width: 640px; text-align: center; margin-bottom: 30px; position: relative; }
    #pdfCard { max-width: 100%; }
    .divider { width: 2px; background: #dde3eb; border-radius: 1px; margin: 0 12px; }
    main::-webkit-scrollbar { width: 10px; }
    main::-webkit-scrollbar-track { background: #2c3e50; }
    main::-webkit-scrollbar-thumb { background: #4b637e; border-radius: 5px; }
    main:hover { scroll-behavior: smooth; }
    .upload-zone { border: 2px dashed #3498db; border-radius: 10px; padding: 40px; margin: 20px 0; background: #f8f9ff; transition: all 0.3s; cursor: pointer; }
    .upload-zone { border: 2px dashed #3498db; border-radius: 10px; padding: 40px; margin: 20px 0; background: #f8f9ff; transition: all 0.3s; cursor: pointer; color: #1f2a44; }
    .upload-zone p { color: #1f2a44; font-weight: 700; }
    .upload-zone span, .upload-zone strong { color: #1f2a44; }
    .upload-zone.dragover { background: #e3f2fd; border-color: #2196f3; }
    .card h2, .card h3 { color: #2c3e50; margin-top: 0; }
    input[type="file"] { margin-top: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
    #progress { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; margin: 10px 0; display: none; }
    #progressBar { height: 100%; background: #3498db; width: 0%; border-radius: 4px; transition: width 0.3s; }
    #summaryCard { max-height: 520px; overflow-y: auto; }
    #summaryCard p { background: #f0f8ff; padding: 20px; border-left: 4px solid #3498db; white-space: pre-wrap; text-align: left; margin: 0; color: #1f2a44; }
    #summaryText { color: #1f2a44; min-height: 340px; max-height: 440px; overflow-y: auto; }
    #summaryText p { color: #1f2a44; }
    #pdfCard iframe { width: 100%; height: 500px; border: 1px solid #ddd; border-radius: 5px; }
    #pdfCard .pdf-toolbar { display: flex; justify-content: flex-end; margin-top: 10px; }
    #pdfCard .pdf-toolbar button { padding: 8px 12px; background: #1abc9c; color: #fff; border: 0; border-radius: 5px; cursor: pointer; }
    #pdfCard .pdf-toolbar button:hover { background: #16a085; }
    .placeholder { color: #888; font-style: italic; min-height: 200px; display: flex; align-items: center; justify-content: center; }
    footer { background: #34495e; color: #ecf0f1; text-align: center; padding: 15px; position: fixed; bottom: 0; left: 0; right: 0; margin-top: 0; z-index: 100; }
    @media (max-width: 768px) { main { flex-direction: column; } .left { margin-right: 0; } .card { width: 95%; } #pdfCard iframe { height: 300px; } }
  </style>
</head>
<body>
  <header>
    <div style="display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto;">
      <h1>📄 PDFSense</h1>
      <a href="history.html" style="color:#fff;background:#1abc9c;padding:8px 14px;border-radius:6px;text-decoration:none;font-weight:600;">Upload History</a>
    </div>
  </header>
  
  <main>
    <div class="left">
      <!-- Upload Card with Drag-Drop -->
      <div class="card">
        <h2>Upload PDF</h2>
        <div id="uploadZone" class="upload-zone">
          <p>📁 Drag PDF here or <strong>click to browse</strong></p>
          <input type="file" id="fileInput" accept="application/pdf" style="display: none;">
          <div id="progress"><div id="progressBar"></div></div>
        </div>
      </div>
      
      <!-- PDF Card -->
      <div id="pdfCard" class="card placeholder">PDF preview appears here</div>
    </div>

    <div class="divider"></div>
    
    <div class="right">
      <!-- Summary Card -->
      <div id="summaryCard" class="card">
        <h3>📝 Summary</h3>
        <div id="summaryText" style="text-align:left; max-height: 320px; overflow-y:auto; border:1px solid #eef2f7; border-radius:6px; padding: 14px; background:#fbfdff; min-height:220px;">
          <p style="margin:0;color:#888;">Summary output will appear here.</p>
        </div>
      </div>

      <!-- Audio Controls Card -->
      <div class="card" style="background:#fff8f0;">
        <h3 style="margin-top:0;">🎤 Audio Controls</h3>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
          <button id="startSttBtn" style="padding:10px 16px;border-radius:6px;border:none;background:#3498db;color:#fff;cursor:pointer;font-weight:600;">Start STT</button>
          <button id="stopSttBtn" style="padding:10px 16px;border-radius:6px;border:none;background:#ff6b6b;color:#fff;cursor:pointer;font-weight:600;">Stop STT</button>
          <button id="ttsBtn" style="padding:10px 16px;border-radius:6px;border:none;background:#2ecc71;color:#fff;cursor:pointer;font-weight:600;">Speak Summary</button>
          <button id="stopTtsBtn" style="padding:10px 16px;border-radius:6px;border:none;background:#f39c12;color:#fff;cursor:pointer;font-weight:600;">Stop Speaking</button>
        </div>
      </div>
    </div>
  </main>
  
  <footer>&copy; 2026 PDF Reader</footer>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const summaryCard = document.getElementById('summaryCard');
    const summaryText = document.getElementById('summaryText');
    const pdfCard = document.getElementById('pdfCard');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const startSttBtn = document.getElementById('startSttBtn');
    const stopSttBtn = document.getElementById('stopSttBtn');
    const ttsBtn = document.getElementById('ttsBtn');
    const stopTtsBtn = document.getElementById('stopTtsBtn');

    let currentSummary = '';
    const localApiOrigin = 'http://localhost:3000';
    const configuredApiOrigin = (
      window.API_BASE_URL ||
      document.querySelector('meta[name="api-base-url"]')?.content ||
      ''
    ).replace(/\/$/, '');
    const apiOrigin = configuredApiOrigin || (
      ['localhost', '127.0.0.1'].includes(window.location.hostname)
        ? localApiOrigin
        : window.location.origin
    );

    function buildApiUrl(path) {
      return `${apiOrigin}${path}`;
    }
    let recognition = null;
    let speechUtterance = null;

    if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = true;
      recognition.continuous = true;

      recognition.addEventListener('result', (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
          transcript += event.results[i][0].transcript;
        }
        summaryText.innerHTML = `<p>${currentSummary}</p><p><strong>STT:</strong> ${transcript}</p>`;
      });

      recognition.addEventListener('end', () => {
        console.log('Speech recognition stopped.');
      });

      recognition.addEventListener('error', (error) => {
        alert('STT error: ' + error.error);
      });
    } else {
      startSttBtn.disabled = true;
      stopSttBtn.disabled = true;
      startSttBtn.textContent = 'STT not supported';
    }

    function speakText(text) {
      if (!('speechSynthesis' in window)) {
        alert('Text-to-Speech not supported in this browser.');
        return;
      }
      if (speechUtterance) {
        window.speechSynthesis.cancel();
      }
      speechUtterance = new SpeechSynthesisUtterance(text);
      speechUtterance.rate = 1;
      speechUtterance.pitch = 1;
      window.speechSynthesis.speak(speechUtterance);
    }

    startSttBtn.addEventListener('click', () => {
      if (!recognition) return;
      recognition.start();
      startSttBtn.textContent = 'Listening...';
    });

    stopSttBtn.addEventListener('click', () => {
      if (!recognition) return;
      recognition.stop();
      startSttBtn.textContent = 'Start STT';
    });

    ttsBtn.addEventListener('click', () => {
      const text = currentSummary || summaryText.textContent || 'No summary available yet.';
      speakText(text);
    });

    stopTtsBtn.addEventListener('click', () => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
      }
    });


    // Drag & Drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      uploadZone.addEventListener(eventName, preventDefaults, false);
    });
    function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

    ['dragenter', 'dragover'].forEach(eventName => {
      uploadZone.addEventListener(eventName, highlight, false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
      uploadZone.addEventListener(eventName, unhighlight, false);
    });
    function highlight(e) { uploadZone.classList.add('dragover'); }
    function unhighlight(e) { uploadZone.classList.remove('dragover'); }

    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('drop', handleDrop, false);
    fileInput.addEventListener('change', handleFile);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      handleFiles(files);
    }
    function handleFile(e) {
      const files = e.target.files;
      handleFiles(files);
    }
    async function handleFiles(files) {
      const file = files[0];
      if (!file || file.type !== 'application/pdf') {
        alert('Please select a PDF file');
        return;
      }
      await uploadFile(file);
    }

    async function uploadFile(file) {
      summaryText.innerHTML = '<p>Loading...</p>';
      pdfCard.innerHTML = '<p>Loading...</p>';
      progress.style.display = 'block';

      const formData = new FormData();
      formData.append('pdf', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', buildApiUrl('/upload'));

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const percent = (e.loaded / e.total) * 100;
          progressBar.style.width = percent + '%';
        }
      };

      xhr.onload = async () => {
        progress.style.display = 'none';
        if (xhr.status === 200) {
          const data = JSON.parse(xhr.responseText);
          const pdfUrl = buildApiUrl(`/pdfs/${data.file.filename}`);
          currentSummary = data.summary || 'N/A';
          summaryText.innerHTML = `<p>${currentSummary}</p>`;
          pdfCard.innerHTML = `<h3>📄 Preview:</h3><iframe id="pdfFrame" src="${pdfUrl}" frameborder="0"></iframe><div class="pdf-toolbar"><button id="fullscreenBtn">Fullscreen</button></div>`;
          const fullscreenBtn = document.getElementById('fullscreenBtn');
          const pdfFrame = document.getElementById('pdfFrame');
          fullscreenBtn.addEventListener('click', () => {
            if (pdfFrame.requestFullscreen) {
              pdfFrame.requestFullscreen();
            } else if (pdfFrame.webkitRequestFullscreen) {
              pdfFrame.webkitRequestFullscreen();
            } else if (pdfFrame.msRequestFullscreen) {
              pdfFrame.msRequestFullscreen();
            }
          });
        } else {
          summaryText.innerHTML = '<p style="color: red;">Upload failed</p>';
        }
      };

      xhr.onerror = () => {
        progress.style.display = 'none';
        summaryText.innerHTML = '<p style="color: red;">Network error. Backend running?</p>';
      };

      xhr.send(formData);
    }
  </script>
</body>
</html>
